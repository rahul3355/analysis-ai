name: CI
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        working-directory: ./
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test
      - run: npm run build
