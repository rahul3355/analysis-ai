<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether - AI Agent Query Cycle</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Minimalist Grayscale & Warm Light Design (Anthropic Style) */
        :root {
            --bg-dark: #faf9f5;
            --panel-bg: #f5f4f0;
            --border-color: #e5e2d9;
            --text-main: #191919;
            --text-muted: #6e6d65;
            --primary-color: #191919;
            
            --accent-blue: #6a9bcc;
            --accent-orange: #d97757;
        }

        .theme-cream {
            --bg-dark: #faf9f5;
            --panel-bg: #f5f4f0;
            --border-color: #e5e2d9;
            --text-main: #191919;
            --text-muted: #6e6d65;
            --primary-color: #191919;
        }

        .theme-slate {
            --bg-dark: #f8fafc;
            --panel-bg: #f1f5f9;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-color: #0f172a;
        }

        .theme-mono {
            --bg-dark: #ffffff;
            --panel-bg: #f8f8f8;
            --border-color: #e0e0e0;
            --text-main: #000000;
            --text-muted: #707070;
            --primary-color: #000000;
        }

        .theme-alabaster {
            --bg-dark: #f9f8f6;
            --panel-bg: #f2f1ed;
            --border-color: #e3e1da;
            --text-main: #141413;
            --text-muted: #787770;
            --primary-color: #141413;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background-color: transparent;
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: color 0.3s ease;
        }

        header {
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: transparent;
            z-index: 10;
            transition: border-color 0.3s ease;
        }

        header h1 {
            font-family: 'Lora', Georgia, serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        select {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: inherit;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .dashboard-container {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: transparent;
        }

        .canvas-area {
            width: 100%;
            max-width: 800px;
            background: transparent;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- Animations --- */
        
        /* Straight dashed connection lines flow */
        .conn-straight {
            stroke: var(--border-color);
            stroke-width: 1.5;
            stroke-dasharray: 6 6;
            animation: flow-right 1s linear infinite;
        }

        @keyframes flow-right {
            from { stroke-dashoffset: 20; }
            to { stroke-dashoffset: 0; }
        }

        /* Curved lines */
        .conn-curved {
            stroke: var(--border-color);
            stroke-width: 1.5;
            fill: none;
        }

        /* User Chat Bubbles inside Laptop Screen */
        .chat-bubble-1 {
            animation: bubble-1-fade 6s infinite cubic-bezier(0.16, 1, 0.3, 1);
        }

        .chat-bubble-2 {
            animation: bubble-2-fade 6s infinite cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes bubble-1-fade {
            0%, 8% { opacity: 0; transform: translate(25px, -27px) scale(0.9); }
            15%, 90% { opacity: 1; transform: translate(25px, -35px) scale(1); }
            95%, 100% { opacity: 0; }
        }

        @keyframes bubble-2-fade {
            0%, 68% { opacity: 0; transform: translate(-25px, -7px) scale(0.9); }
            75%, 90% { opacity: 1; transform: translate(-25px, -15px) scale(1); }
            95%, 100% { opacity: 0; }
        }

        /* AI Agent Active Highlights */
        .neural-network line {
            animation: agent-active-lines 6s infinite ease-in-out;
        }

        .neural-network circle {
            animation: agent-active-nodes 6s infinite ease-in-out;
        }

        @keyframes agent-active-lines {
            0%, 25% { stroke: var(--border-color); stroke-width: 0.75; }
            30%, 70% { stroke: var(--accent-orange); stroke-width: 1.25; }
            75%, 100% { stroke: var(--border-color); stroke-width: 0.75; }
        }

        @keyframes agent-active-nodes {
            0%, 25% { fill: var(--bg-dark); stroke-width: 1.5; }
            30%, 70% { fill: var(--accent-blue); stroke-width: 2; }
            75%, 100% { fill: var(--bg-dark); stroke-width: 1.5; }
        }

        /* Vector DB Highlights */
        .vectordb-node {
            animation: db-active-nodes 6s infinite ease-in-out;
        }

        .vectordb-edge {
            animation: db-active-edges 6s infinite ease-in-out;
        }

        @keyframes db-active-nodes {
            0%, 35% { fill: var(--bg-dark); stroke-width: 1.5; }
            45%, 60% { fill: var(--accent-blue); stroke-width: 2.2; }
            70%, 100% { fill: var(--bg-dark); stroke-width: 1.5; }
        }

        @keyframes db-active-edges {
            0%, 35% { stroke: var(--primary-color); stroke-width: 1.5; }
            45%, 60% { stroke: var(--accent-blue); stroke-width: 2.2; }
            70%, 100% { stroke: var(--primary-color); stroke-width: 1.5; }
        }

        /* BigQuery Highlights */
        .bigquery-part {
            animation: bq-active 6s infinite ease-in-out;
        }

        @keyframes bq-active {
            0%, 35% { fill: var(--bg-dark); stroke: var(--primary-color); stroke-width: 1.5; }
            45%, 60% { fill: var(--accent-orange); stroke: var(--accent-orange); stroke-width: 2; }
            70%, 100% { fill: var(--bg-dark); stroke: var(--primary-color); stroke-width: 1.5; }
        }
    </style>
</head>
<body class="theme-cream">

    <header>
        <h1>Aether</h1>
        <div class="header-meta">
            <select id="theme-selector">
                <option value="theme-cream">Warm Cream</option>
                <option value="theme-slate">Slate Light</option>
                <option value="theme-mono">Pure Mono</option>
                <option value="theme-alabaster">Alabaster Warm</option>
            </select>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="canvas-area">
            <svg viewBox="0 0 950 500" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
                <!-- ================= LINKS LAYER ================= -->
                <!-- User to Agent Straight Connection (Upper) -->
                <path class="conn-straight" d="M 185,240 L 395,240" />
                
                <!-- Agent to User Straight Connection (Lower) -->
                <path class="conn-straight" d="M 395,260 L 185,260" />

                <!-- Agent to VectorDB Curve -->
                <path class="conn-curved" d="M 505,230 Q 630,140 755,140" />

                <!-- Agent to BigQuery Curve -->
                <path class="conn-curved" d="M 505,270 Q 630,360 755,360" />

                <!-- ================= COMPONENT NODES ================= -->
                
                <!-- 1. LAPTOP (USER) -->
                <g id="laptop" transform="translate(120, 250)">
                    <!-- Screen Outer Frame -->
                    <rect x="-65" y="-60" width="130" height="80" rx="6" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                    <!-- Screen Interior -->
                    <rect x="-60" y="-55" width="120" height="70" rx="3" fill="#ffffff" stroke="var(--border-color)" stroke-width="1" />
                    <!-- Hinge -->
                    <rect x="-20" y="20" width="40" height="5" rx="1.5" fill="var(--primary-color)" />
                    <!-- Base (Keyboard) -->
                    <polygon points="-75,25 75,25 85,33 -85,33" fill="var(--panel-bg)" stroke="var(--primary-color)" stroke-width="1.5" stroke-linejoin="round" />
                    <!-- Trackpad -->
                    <rect x="-12" y="28" width="24" height="4" rx="0.5" fill="none" stroke="var(--primary-color)" stroke-width="1" />
                    
                    <!-- Chat Bubble 1 (User - Blue) -->
                    <g class="chat-bubble-1">
                        <rect x="-22" y="-8" width="44" height="16" rx="3" fill="var(--accent-blue)" />
                    </g>
                    
                    <!-- Chat Bubble 2 (Agent - Orange) -->
                    <g class="chat-bubble-2">
                        <rect x="-22" y="-8" width="44" height="16" rx="3" fill="var(--accent-orange)" />
                    </g>
                </g>

                <!-- 2. AI AGENT -->
                <g id="agent" transform="translate(450, 250)">
                    <!-- Outer container box -->
                    <rect class="node-bg" x="-45" y="-45" width="90" height="90" rx="5" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                    
                    <!-- Graph Neural Net -->
                    <g class="neural-network" opacity="0.85">
                        <!-- Connecting Edges -->
                        <line x1="-20" y1="-15" x2="0" y2="-20" stroke="var(--border-color)" stroke-width="1" />
                        <line x1="-20" y1="-15" x2="0" y2="0" stroke="var(--border-color)" stroke-width="1" />
                        <line x1="-20" y1="-15" x2="0" y2="20" stroke="var(--border-color)" stroke-width="1" />
                        <line x1="-20" y1="15" x2="0" y2="-20" stroke="var(--border-color)" stroke-width="1" />
                        <line x1="-20" y1="15" x2="0" y2="0" stroke="var(--border-color)" stroke-width="1" />
                        <line x1="-20" y1="15" x2="0" y2="20" stroke="var(--border-color)" stroke-width="1" />
                        
                        <line x1="0" y1="-20" x2="20" y2="-12" stroke="var(--border-color)" stroke-width="1" />
                        <line x1="0" y1="-20" x2="20" y2="12" stroke="var(--border-color)" stroke-width="1" />
                        <line x1="0" y1="0" x2="20" y2="-12" stroke="var(--border-color)" stroke-width="1" />
                        <line x1="0" y1="0" x2="20" y2="12" stroke="var(--border-color)" stroke-width="1" />
                        <line x1="0" y1="20" x2="20" y2="-12" stroke="var(--border-color)" stroke-width="1" />
                        <line x1="0" y1="20" x2="20" y2="12" stroke="var(--border-color)" stroke-width="1" />
                        
                        <!-- Layer Circles -->
                        <!-- Input Layer -->
                        <circle cx="-20" cy="-15" r="3" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                        <circle cx="-20" cy="15" r="3" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                        
                        <!-- Hidden Layer -->
                        <circle cx="0" cy="-20" r="3" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                        <circle cx="0" cy="0" r="3" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                        <circle cx="0" cy="20" r="3" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                        
                        <!-- Output Layer -->
                        <circle cx="20" cy="-12" r="3" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                        <circle cx="20" cy="12" r="3" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                    </g>
                </g>

                <!-- 3. VECTOR DB -->
                <!-- Graph-like, scaled to match smaller layout, no border box -->
                <g id="vectordb" transform="translate(780, 140) scale(1.4)">
                    <!-- Edges -->
                    <line class="vectordb-edge" x1="0" y1="-15" x2="0" y2="2" stroke="var(--primary-color)" stroke-width="1.5" />
                    <line class="vectordb-edge" x1="-18" y1="8" x2="0" y2="2" stroke="var(--primary-color)" stroke-width="1.5" />
                    <line class="vectordb-edge" x1="18" y1="8" x2="0" y2="2" stroke="var(--primary-color)" stroke-width="1.5" />
                    <line class="vectordb-edge" x1="0" y1="-15" x2="-18" y2="8" stroke="var(--primary-color)" stroke-width="1.5" />
                    <line class="vectordb-edge" x1="0" y1="-15" x2="18" y2="8" stroke="var(--primary-color)" stroke-width="1.5" />
                    <line class="vectordb-edge" x1="-18" y1="8" x2="18" y2="8" stroke="var(--primary-color)" stroke-width="1.5" />
                    
                    <!-- Vertices -->
                    <circle class="vectordb-node" cx="0" cy="-15" r="4.5" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                    <circle class="vectordb-node" cx="-18" cy="8" r="4.5" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                    <circle class="vectordb-node" cx="18" cy="8" r="4.5" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                    <circle class="vectordb-node" cx="0" cy="2" r="4.5" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                </g>

                <!-- 4. BIGQUERY -->
                <!-- Database Cylinder, scaled to match smaller layout, no border box -->
                <g id="bigquery" transform="translate(780, 360) scale(1.4)">
                    <!-- Cylinder Top Lid -->
                    <ellipse class="bigquery-part" cx="0" cy="-15" rx="18" ry="6" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                    <!-- Cylinder Middle section -->
                    <path class="bigquery-part" d="M -18 -15 V -2 C -18 1, 18 1, 18 -2 V -15" fill="none" stroke="var(--primary-color)" stroke-width="1.5" />
                    <ellipse class="bigquery-part" cx="0" cy="-2" rx="18" ry="6" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                    <!-- Cylinder Bottom section -->
                    <path class="bigquery-part" d="M -18 -2 V 11 C -18 14, 18 14, 18 11 V -2" fill="none" stroke="var(--primary-color)" stroke-width="1.5" />
                    <ellipse class="bigquery-part" cx="0" cy="11" rx="18" ry="6" fill="var(--bg-dark)" stroke="var(--primary-color)" stroke-width="1.5" />
                </g>

                <!-- ================= DATA PACKETS (ANIMATED PARTICLES) ================= -->
                
                <!-- --- Request Particles (Laptop -> Agent) --- -->
                <!-- Particle 1 (Blue, t=1.0s to 1.6s) -->
                <circle r="4.5" fill="var(--accent-blue)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 185,240 L 395,240" keyPoints="0;0;1;1" keyTimes="0;0.167;0.267;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.167;0.17;0.26;0.267;1" />
                </circle>
                <!-- Particle 2 (Orange, t=1.2s to 1.8s) -->
                <circle r="4.5" fill="var(--accent-orange)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 185,240 L 395,240" keyPoints="0;0;1;1" keyTimes="0;0.2;0.3;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.2;0.203;0.293;0.3;1" />
                </circle>
                <!-- Particle 3 (Blue, t=1.4s to 2.0s) -->
                <circle r="4.5" fill="var(--accent-blue)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 185,240 L 395,240" keyPoints="0;0;1;1" keyTimes="0;0.233;0.333;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.233;0.236;0.326;0.333;1" />
                </circle>

                <!-- --- DB Query Particles (Agent -> DBs) --- -->
                <!-- To Vector DB Particle 1 (Blue, t=2.2s to 2.8s) -->
                <circle r="4.5" fill="var(--accent-blue)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 505,230 Q 630,140 755,140" keyPoints="0;0;1;1" keyTimes="0;0.367;0.467;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.367;0.37;0.46;0.467;1" />
                </circle>
                <!-- To Vector DB Particle 2 (Orange, t=2.4s to 3.0s) -->
                <circle r="5" fill="var(--accent-orange)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 505,230 Q 630,140 755,140" keyPoints="0;0;1;1" keyTimes="0;0.4;0.5;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.4;0.403;0.493;0.5;1" />
                </circle>

                <!-- To BigQuery Particle 1 (Orange, t=2.2s to 2.8s) -->
                <circle r="4.5" fill="var(--accent-orange)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 505,270 Q 630,360 755,360" keyPoints="0;0;1;1" keyTimes="0;0.367;0.467;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.367;0.37;0.46;0.467;1" />
                </circle>
                <!-- To BigQuery Particle 2 (Blue, t=2.4s to 3.0s) -->
                <circle r="4.5" fill="var(--accent-blue)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 505,270 Q 630,360 755,360" keyPoints="0;0;1;1" keyTimes="0;0.4;0.5;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.4;0.403;0.493;0.5;1" />
                </circle>

                <!-- --- DB Response Particles (DBs -> Agent) --- -->
                <!-- From Vector DB Particle 1 (Blue, t=3.1s to 3.7s) -->
                <circle r="4.5" fill="var(--accent-blue)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 505,230 Q 630,140 755,140" keyPoints="1;1;0;0" keyTimes="0;0.517;0.617;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.517;0.52;0.61;0.617;1" />
                </circle>
                <!-- From Vector DB Particle 2 (Orange, t=3.3s to 3.9s) -->
                <circle r="4.5" fill="var(--accent-orange)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 505,230 Q 630,140 755,140" keyPoints="1;1;0;0" keyTimes="0;0.55;0.65;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.55;0.553;0.643;0.65;1" />
                </circle>

                <!-- From BigQuery Particle 1 (Orange, t=3.1s to 3.7s) -->
                <circle r="4.5" fill="var(--accent-orange)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 505,270 Q 630,360 755,360" keyPoints="1;1;0;0" keyTimes="0;0.517;0.617;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.517;0.52;0.61;0.617;1" />
                </circle>
                <!-- From BigQuery Particle 2 (Blue, t=3.3s to 3.9s) -->
                <circle r="4.5" fill="var(--accent-blue)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 505,270 Q 630,360 755,360" keyPoints="1;1;0;0" keyTimes="0;0.55;0.65;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.55;0.553;0.643;0.65;1" />
                </circle>

                <!-- --- Agent Response Particles (Agent -> Laptop) --- -->
                <!-- Particle 1 (Orange, t=4.0s to 4.6s) -->
                <circle r="4.5" fill="var(--accent-orange)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 395,260 L 185,260" keyPoints="0;0;1;1" keyTimes="0;0.667;0.767;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.667;0.67;0.76;0.767;1" />
                </circle>
                <!-- Particle 2 (Blue, t=4.2s to 4.8s) -->
                <circle r="4.5" fill="var(--accent-blue)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 395,260 L 185,260" keyPoints="0;0;1;1" keyTimes="0;0.7;0.8;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.7;0.703;0.793;0.8;1" />
                </circle>
                <!-- Particle 3 (Orange, t=4.4s to 5.0s) -->
                <circle r="4.5" fill="var(--accent-orange)" opacity="0">
                    <animateMotion dur="6s" repeatCount="indefinite" path="M 395,260 L 185,260" keyPoints="0;0;1;1" keyTimes="0;0.733;0.833;1" calcMode="linear" />
                    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.733;0.736;0.826;0.833;1" />
                </circle>
            </svg>
        </div>
    </div>

    <script>
        const themeSelector = document.getElementById('theme-selector');
        
        themeSelector.addEventListener('change', (e) => {
            document.body.className = '';
            document.body.classList.add(e.target.value);
        });
    </script>
</body>
</html>
